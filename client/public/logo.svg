<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>

    <!-- Dark background radial glow -->
    <radialGradient id="bg" cx="50%" cy="44%" r="62%">
      <stop offset="0%"   stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>

    <!-- Cyan → Blue → Purple across the full width -->
    <linearGradient id="g" x1="0" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="48%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Top-light shine for 3D depth -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-18%" y="-10%" width="136%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background rounded square -->
  <rect width="160" height="160" rx="28" fill="url(#bg)"/>
  <!-- Hairline inner border -->
  <rect x="1.5" y="1.5" width="157" height="157" rx="26.5"
        stroke="white" stroke-opacity="0.07" stroke-width="1.2" fill="none"/>

  <!-- ═══════════════════════════
       DUMBBELL + H  (gradient)
  ═══════════════════════════ -->
  <g filter="url(#glow)">

    <!-- LEFT small outer plate -->
    <rect x="5"   y="42"  width="18" height="76" rx="7"  fill="url(#g)"/>
    <!-- LEFT large inner plate (H left stroke) -->
    <rect x="28"  y="12"  width="30" height="136" rx="11" fill="url(#g)"/>

    <!-- RIGHT large inner plate (H right stroke) -->
    <rect x="102" y="12"  width="30" height="136" rx="11" fill="url(#g)"/>
    <!-- RIGHT small outer plate -->
    <rect x="137" y="42"  width="18" height="76" rx="7"  fill="url(#g)"/>

  </g>

  <!-- Shine overlays -->
  <rect x="5"   y="42"  width="18" height="28" rx="7"  fill="url(#shine)"/>
  <rect x="28"  y="12"  width="30" height="50" rx="11" fill="url(#shine)"/>
  <rect x="102" y="12"  width="30" height="50" rx="11" fill="url(#shine)"/>
  <rect x="137" y="42"  width="18" height="28" rx="7"  fill="url(#shine)"/>

</svg>
