<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>

    <!-- Blue gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0e1a4a"/>
    </linearGradient>

    <!-- White top-light shine on dumbbell -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle glow on dumbbell -->
    <filter id="glow" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="20.5"
        stroke="white" stroke-opacity="0.1" stroke-width="1" fill="none"/>

  <!-- ══ DUMBBELL — perfectly horizontal, centered at y=50 ══ -->
  <g filter="url(#glow)">

    <!-- Left outer plate -->
    <rect x="8"  y="33" width="12" height="34" rx="4.5" fill="white"/>
    <!-- Left collar -->
    <rect x="20" y="39" width="8"  height="22" rx="3"   fill="white" fill-opacity="0.85"/>
    <!-- Bar -->
    <rect x="28" y="45" width="44" height="10" rx="3"   fill="white" fill-opacity="0.9"/>
    <!-- Right collar -->
    <rect x="72" y="39" width="8"  height="22" rx="3"   fill="white" fill-opacity="0.85"/>
    <!-- Right outer plate -->
    <rect x="80" y="33" width="12" height="34" rx="4.5" fill="white"/>

  </g>

  <!-- Shine overlays for 3-D depth -->
  <rect x="8"  y="33" width="12" height="13" rx="4.5" fill="url(#shine)"/>
  <rect x="20" y="39" width="8"  height="9"  rx="3"   fill="url(#shine)"/>
  <rect x="28" y="45" width="44" height="4"  rx="3"   fill="url(#shine)"/>
  <rect x="72" y="39" width="8"  height="9"  rx="3"   fill="url(#shine)"/>
  <rect x="80" y="33" width="12" height="13" rx="4.5" fill="url(#shine)"/>

</svg>
